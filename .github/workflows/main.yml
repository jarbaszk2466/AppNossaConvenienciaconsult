name: Gerar APK Final
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev libgmp-dev libmpc-dev
          pip3 install --user --upgrade Cython buildozer flet

      - name: Fabricar APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Limpeza total para evitar conflitos de versões de flet
          rm -rf .buildozer/android/platform/build-arm64-v8a/build/python-installs
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Final_Nossa_Conveniencia
          path: bin/*.apk
